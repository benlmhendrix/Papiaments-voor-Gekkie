<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papiaments Leren</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5efe6;
    --coral: #e05a3a;
    --coral-light: #f07a5a;
    --teal: #1a7a6e;
    --teal-light: #2a9a8e;
    --amber: #f0a020;
    --ink: #1a1a2e;
    --muted: #8a7a6e;
    --card-bg: #fffdf9;
    --wrong: #c0392b;
    --wrong-light: #f9eae8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(224,90,58,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(26,122,110,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 560px;
    padding: 36px 0 24px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .logo-flag {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
  }

  h1 span {
    color: var(--coral);
    font-style: italic;
  }

  .subtitle {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* === SCREEN MANAGEMENT === */
  .screen { display: none; width: 100%; max-width: 560px; position: relative; z-index: 1; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* === MODE SELECT === */
  #screen-mode {
    gap: 16px;
    padding-top: 8px;
  }

  .mode-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .mode-btn {
    width: 100%;
    padding: 28px 32px;
    background: var(--card-bg);
    border: 2px solid transparent;
    border-radius: 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    box-shadow: 0 2px 16px rgba(26,26,46,0.06);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .mode-btn:hover {
    border-color: var(--coral);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(224,90,58,0.15);
  }

  .mode-icon {
    font-size: 36px;
    flex-shrink: 0;
  }

  .mode-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    display: block;
  }

  .mode-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }

  /* === QUIZ CARD === */
  #screen-quiz {
    gap: 20px;
    padding-top: 8px;
  }

  .progress-bar-wrap {
    width: 100%;
    background: rgba(26,26,46,0.08);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), var(--amber));
    border-radius: 100px;
    transition: width 0.4s ease;
  }

  .progress-meta {
    width: 100%;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-top: -12px;
  }

  .score-pill {
    background: var(--teal);
    color: white;
    padding: 3px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
  }

  .card {
    width: 100%;
    background: var(--card-bg);
    border-radius: 24px;
    padding: 40px 36px 32px;
    box-shadow: 0 4px 24px rgba(26,26,46,0.08);
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--coral), var(--amber));
  }

  .lang-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
    background: rgba(224,90,58,0.1);
    color: var(--coral);
  }

  .word-prompt {
    font-family: 'Fraunces', serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
    min-height: 60px;
  }

  .lang-arrow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .lang-arrow::before, .lang-arrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(26,26,46,0.1);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
    margin-top: 4px;
  }

  #answer-input {
    flex: 1;
    padding: 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    background: rgba(26,26,46,0.04);
    border: 2px solid transparent;
    border-radius: 14px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  #answer-input:focus {
    border-color: var(--coral);
    background: white;
  }

  #answer-input.correct {
    border-color: var(--teal);
    background: rgba(26,122,110,0.05);
  }

  #answer-input.wrong {
    border-color: var(--wrong);
    background: var(--wrong-light);
  }

  #submit-btn {
    padding: 14px 22px;
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }

  #submit-btn:hover { background: var(--coral-light); transform: scale(1.02); }
  #submit-btn:active { transform: scale(0.98); }

  /* Feedback area */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 10px;
  }

  .feedback.show { display: flex; }

  .feedback.correct-fb {
    background: rgba(26,122,110,0.08);
    color: var(--teal);
  }

  .feedback.wrong-fb {
    background: var(--wrong-light);
    color: var(--wrong);
  }

  .feedback-icon { font-size: 20px; }

  .correct-answer {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-left: 4px;
  }

  #next-btn {
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: all 0.15s ease;
    letter-spacing: 0.3px;
  }

  #next-btn:hover { background: #2a2a4a; transform: translateY(-1px); }
  #next-btn:active { transform: translateY(0); }
  #next-btn.show { display: block; }

  .btn-back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 4px;
    align-self: flex-start;
  }

  .btn-back:hover { color: var(--ink); }

  /* === CONFETTI === */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 400px) {
    .card { padding: 28px 20px 24px; }
    .input-row { flex-direction: column; }
    #submit-btn { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-flag">🌊 🦜 ☀️</div>
  <h1>Papiaments <span>leren</span></h1>
  <p class="subtitle">Kies een richting en ga aan de slag</p>
</header>

<!-- SCREEN: mode keuze -->
<div id="screen-mode" class="screen active">
  <div class="mode-label">Oefen richting</div>

  <button class="mode-btn" onclick="startQuiz('nl-pap')">
    <span class="mode-icon">🇳🇱→🌴</span>
    <span>
      <span class="mode-title">Nederlands → Papiaments</span>
      <span class="mode-desc">Je ziet een Nederlands woord, typ de Papiamentse vertaling</span>
    </span>
  </button>

  <button class="mode-btn" onclick="startQuiz('pap-nl')">
    <span class="mode-icon">🌴→🇳🇱</span>
    <span>
      <span class="mode-title">Papiaments → Nederlands</span>
      <span class="mode-desc">Je ziet een Papiaments woord, typ de Nederlandse vertaling</span>
    </span>
  </button>
</div>

<!-- SCREEN: quiz -->
<div id="screen-quiz" class="screen">
  <button class="btn-back" onclick="goHome()">← Terug naar keuze</button>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-meta">
    <span id="progress-text">Vraag 1</span>
    <span class="score-pill" id="score-text">✓ 0</span>
  </div>

  <div class="card">
    <div class="lang-badge" id="from-lang-badge">Nederlands</div>
    <div class="word-prompt" id="word-display">–</div>
    <div class="lang-arrow" id="lang-arrow-label">vertaal naar Papiaments</div>
    <div class="input-row">
      <input type="text" id="answer-input" placeholder="Jouw antwoord…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="submit-btn" onclick="checkAnswer()">Check</button>
    </div>
    <div class="feedback" id="feedback">
      <span class="feedback-icon" id="feedback-icon">✓</span>
      <span id="feedback-text">Goed!</span>
    </div>
  </div>

  <button id="next-btn" onclick="nextWord()">Volgend woord →</button>
</div>

<canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999;width:100%;height:100%;"></canvas>

<script>
// ============================================================
//  WOORDENLIJST
// ============================================================
const WORDS = [
  // Lichaamsdelen & gezondheid - Les 1
  { pap: "Djente",        nl: "tand" },
  { pap: "Dentista",      nl: "tandarts" },
  { pap: "Pashent",       nl: "patiënt" },
  { pap: "Orea",          nl: "oor" },
  { pap: "Nanishi",       nl: "neus" },
  { pap: "Boka",          nl: "mond" },
  { pap: "Stoma",         nl: "maag" },
  { pap: "Barika",        nl: "buik" },
  { pap: "Dolor",         nl: "pijn" },
  { pap: "Dolor di orea", nl: "oorpijn" },
  // Les 2
  { pap: "Delegá",        nl: "mager" },
  { pap: "Guli",          nl: "slikken" },
  { pap: "Kabes",         nl: "hoofd" },
  { pap: "Wowo",          nl: "oog" },
  { pap: "Malu",          nl: "ziek" },
  { pap: "Tripa",         nl: "darm" },
  { pap: "Apetit",        nl: "eetlust" },
  { pap: "Saka",          nl: "overgeven" },
  { pap: "Sinti ral",     nl: "misselijk zijn" },
  { pap: "Sanger",        nl: "bloed" },
  // Vraagwoorden & diversen
  { pap: "Unda",          nl: "waar" },
  { pap: "Dikon",         nl: "waarom" },
  { pap: "Ken",           nl: "wie" },
  { pap: "Kiko",          nl: "wat" },
  { pap: "Kon",           nl: "hoe" },
  { pap: "Mucha",         nl: "kind" },
  { pap: "Pero",          nl: "maar" },
  { pap: "Sigaria",       nl: "sigaret" },
  { pap: "Horta",         nl: "stelen" },
  { pap: "Detené",        nl: "aanhouden" },
  { pap: "Polis",         nl: "politie" },
  { pap: "Huma",          nl: "roken" },
  // Werkwoorden
  { pap: "Kana",          nl: "lopen" },
  { pap: "Baila",         nl: "dansen" },
  { pap: "Yora",          nl: "huilen" },
  { pap: "Hunga",         nl: "spelen" },
  { pap: "Bai",           nl: "gaan" },
  { pap: "Hasi",          nl: "doen" },
  { pap: "Kumpra",        nl: "kopen" },
  { pap: "Bini",          nl: "komen" },
  { pap: "Traha",         nl: "werken" },
  { pap: "Papia",         nl: "praten" },
  { pap: "Kuida",         nl: "verzorgen" },
  { pap: "Duna",          nl: "geven" },
  { pap: "Tende",         nl: "horen" },
  { pap: "Nister",        nl: "niezen" },
  { pap: "Gosa",          nl: "genieten" },
  { pap: "Landa",         nl: "zwemmen" },
  { pap: "Kome",          nl: "eten" },
  { pap: "Para",          nl: "staan" },
  { pap: "Stop",          nl: "stoppen" },
  { pap: "Gaña",          nl: "liegen" },
  { pap: "Grita",         nl: "schreeuwen" },
  { pap: "Biba",          nl: "wonen/leven" },
  // Personen & relaties
  { pap: "Hende",         nl: "mens" },
  { pap: "Mama",          nl: "moeder" },
  { pap: "Tata",          nl: "vader" },
  { pap: "Ruman",         nl: "zus/broer" },
  { pap: "Amiga",         nl: "vriendin" },
  { pap: "Amigu",         nl: "vriend" },
  { pap: "Hómber",        nl: "man" },
  { pap: "Muhé",          nl: "vrouw" },
  { pap: "Shon",          nl: "meneer" },
  // Algemeen vocabulaire
  { pap: "Dia",           nl: "dag" },
  { pap: "Friu",          nl: "koud" },
  { pap: "Leu",           nl: "ver" },
  { pap: "Kueba",         nl: "groot" },
  { pap: "Outo",          nl: "oud" },
  { pap: "Bieu",          nl: "auto" },
  { pap: "Pan",           nl: "brood" },
  { pap: "Korant",        nl: "krant" },
  { pap: "Kabai",         nl: "paard" },
  { pap: "Kabei",         nl: "haar" },
  { pap: "Kara",          nl: "gezicht" },
  { pap: "Mester",        nl: "moeten" },
  { pap: "Faha",          nl: "riem" },
  { pap: "Awa",           nl: "water" },
  { pap: "Nómber",        nl: "naam" },
  { pap: "Kas",           nl: "huis" },
  { pap: "Dede",          nl: "vinger" },
  { pap: "Apel",          nl: "appel" },
  { pap: "Wil",           nl: "wiel" },
  { pap: "Sópi",          nl: "soep" },
  { pap: "Brómer",        nl: "brommer" },
  { pap: "Skuter",        nl: "scooter" },
  { pap: "Baiskel",       nl: "fiets" },
  { pap: "Buki",          nl: "boek" },
];

// ============================================================
//  STATE
// ============================================================
let mode = 'nl-pap';
let shuffled = [];
let currentIndex = 0;
let score = 0;
let answered = false;

// ============================================================
//  SHUFFLING
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
//  NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  showScreen('screen-mode');
}

function startQuiz(selectedMode) {
  mode = selectedMode;
  shuffled = shuffle(WORDS);
  currentIndex = 0;
  score = 0;
  showScreen('screen-quiz');
  loadWord();
}

// ============================================================
//  LOAD WORD
// ============================================================
function loadWord() {
  answered = false;

  // Reset UI
  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = '';
  input.disabled = false;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').className = 'btn';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('submit-btn').style.display = '';

  // Word
  const pair = shuffled[currentIndex];
  const isNlToPap = mode === 'nl-pap';

  document.getElementById('word-display').textContent = isNlToPap ? pair.nl : pair.pap;
  document.getElementById('from-lang-badge').textContent = isNlToPap ? 'Nederlands' : 'Papiaments';
  document.getElementById('lang-arrow-label').textContent = isNlToPap ? 'vertaal naar Papiaments' : 'vertaal naar Nederlands';

  // Progress
  const total = shuffled.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `Woord ${currentIndex + 1} / ${total}`;
  document.getElementById('score-text').textContent = `✓ ${score}`;

  input.focus();
}

// ============================================================
//  CHECK ANSWER
// ============================================================
function checkAnswer() {
  if (answered) return;
  answered = true;

  const input = document.getElementById('answer-input');
  const userRaw = input.value.trim();
  if (!userRaw) { answered = false; input.focus(); return; }

  const pair = shuffled[currentIndex];
  const isNlToPap = mode === 'nl-pap';
  const correctRaw = isNlToPap ? pair.pap : pair.nl;

  const normalize = s => s.toLowerCase()
    .replace(/[áàä]/g, 'a').replace(/[éèë]/g, 'e')
    .replace(/[íìï]/g, 'i').replace(/[óòö]/g, 'o')
    .replace(/[úùü]/g, 'u').replace(/ñ/g, 'n')
    .trim();

  const correct = normalize(userRaw) === normalize(correctRaw);

  input.disabled = true;

  const feedback = document.getElementById('feedback');
  const icon = document.getElementById('feedback-icon');
  const text = document.getElementById('feedback-text');

  if (correct) {
    input.classList.add('correct');
    icon.textContent = '✓';
    text.innerHTML = `Goed! <span class="correct-answer">${correctRaw}</span>`;
    feedback.className = 'feedback show correct-fb';
    score++;
    document.getElementById('score-text').textContent = `✓ ${score}`;
    launchConfetti();
  } else {
    input.classList.add('wrong');
    icon.textContent = '✗';
    text.innerHTML = `Het juiste antwoord: <span class="correct-answer">${correctRaw}</span>`;
    feedback.className = 'feedback show wrong-fb';
  }

  document.getElementById('submit-btn').style.display = 'none';
  const nextBtn = document.getElementById('next-btn');

  const isLast = currentIndex >= shuffled.length - 1;
  nextBtn.textContent = isLast ? 'Opnieuw beginnen 🔄' : 'Volgend woord →';
  nextBtn.classList.add('show');
  nextBtn.style.display = 'block';
}

// ============================================================
//  NEXT WORD
// ============================================================
function nextWord() {
  currentIndex++;
  if (currentIndex >= shuffled.length) {
    // Reshuffle and restart
    shuffled = shuffle(WORDS);
    currentIndex = 0;
    score = 0;
  }
  loadWord();
}

// ============================================================
//  ENTER KEY
// ============================================================
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!answered) checkAnswer();
    else if (document.getElementById('next-btn').classList.contains('show')) nextWord();
  }
});

// ============================================================
//  CONFETTI
// ============================================================
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#e05a3a','#f0a020','#1a7a6e','#e8c84a','#5b8af0','#e06090'];
  const pieces = [];
  const count = 60;

  for (let i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 40,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: 3 + Math.random() * 5,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.3,
      wobble: Math.random() * 4,
      wobbleSpeed: 0.05 + Math.random() * 0.1,
      wobblePos: Math.random() * Math.PI * 2,
    });
  }

  let frame = 0;
  const maxFrames = 80;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    if (frame > maxFrames) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }

    pieces.forEach(p => {
      p.y += p.speed;
      p.wobblePos += p.wobbleSpeed;
      p.angle += p.spin;
      const x = p.x + Math.sin(p.wobblePos) * p.wobble;
      const alpha = Math.max(0, 1 - frame / maxFrames);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 1.5);
      ctx.restore();
    });

    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
